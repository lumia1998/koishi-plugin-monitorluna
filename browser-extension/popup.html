<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MonitorLuna Settings</title>
<style>
body{width:320px;padding:16px;font-family:sans-serif;font-size:14px}
h3{margin:0 0 12px;font-size:16px}
label{display:block;margin:8px 0 4px;font-weight:600}
input{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
button{width:100%;padding:8px;margin-top:12px;background:#1976d2;color:#fff;border:none;border-radius:4px;cursor:pointer}
button:hover{background:#1565c0}
.status{margin-top:12px;padding:8px;border-radius:4px;font-size:12px}
.status.ok{background:#c8e6c9;color:#2e7d32}
.status.error{background:#ffcdd2;color:#c62828}
</style>
</head>
<body>
<h3>MonitorLuna Browser Tracker</h3>
<label>WebSocket URL</label>
<input type="text" id="url" placeholder="ws://127.0.0.1:5140/monitorluna">
<label>Token</label>
<input type="password" id="token" placeholder="与 Koishi 配置一致">
<label>Device ID</label>
<input type="text" id="deviceId" placeholder="my-pc">
<button id="save">保存</button>
<div class="status" id="status" style="display:none"></div>
<script src="popup.js"></script>
</body>
</html>
